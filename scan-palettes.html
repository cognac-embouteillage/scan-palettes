<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Scan Palettes">
<meta name="theme-color" content="#0a0a0a">
<title>Scan Palettes</title>
<style>*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a0a0a;--sur:#151515;--s2:#1e1e1e;--acc:#c0392b;--or:#e67e22;--gold:#f0a500;--grn:#27ae60;--text:#f0f0f0;--mut:#888;--brd:rgba(255,255,255,0.08);--r:14px;--rs:10px;}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:480px;margin:0 auto;}
.hdr{padding:48px 16px 10px;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--brd);}
.hdr-top{display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:6px;}
.logo{height:180px;border-radius:8px;display:block;margin:0 auto;}
.hdr-right{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:8px;}
.badge{background:var(--acc);color:#fff;font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;}
.hdr-of{font-size:12px;color:var(--mut);}
.hdr-of b{color:var(--gold);}
.ver{font-size:10px;color:rgba(255,255,255,0.3);text-align:right;margin-top:3px;}
.page{padding:12px 16px 110px;}
.box{border-radius:var(--r);border:1px solid var(--brd);padding:16px;margin-bottom:14px;}
.box-d{background:var(--sur);}
.box-r{background:linear-gradient(135deg,#1a0800,#100500);border-color:rgba(192,57,43,0.3);}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-bottom:10px;}
.inp{display:block;width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:var(--rs);color:var(--text);font-size:15px;padding:11px 13px;outline:none;-webkit-appearance:none;font-family:inherit;margin-bottom:10px;}
.inp:focus{border-color:var(--acc);}
.inp-of{font-size:18px;font-weight:700;text-align:center;color:var(--gold);letter-spacing:2px;}
select.inp{cursor:pointer;}
textarea.inp{resize:none;min-height:58px;line-height:1.4;margin-bottom:0;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:var(--rs);padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.btn:last-child{margin-bottom:0;}
.btn:active{opacity:.8;}
.btn:disabled{opacity:.3;cursor:default;}
.r{background:var(--acc);color:#fff;}
.o{background:var(--or);color:#fff;}
.g{background:var(--grn);color:#fff;}
.dk{background:var(--s2);color:var(--text);}
.phl{display:block;cursor:pointer;margin-bottom:10px;}
.phl input{display:none;}
.pz{background:var(--s2);border:2px dashed rgba(192,57,43,0.35);border-radius:var(--rs);padding:20px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.pz span{font-size:15px;font-weight:600;color:var(--acc);}
.pz small{font-size:12px;color:var(--mut);}
.pv{position:relative;margin-bottom:10px;}
.pv img{width:100%;border-radius:var(--rs);max-height:200px;object-fit:cover;}
.rep{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;padding:6px 10px;cursor:pointer;}
.sw{display:none;align-items:center;gap:10px;padding:10px 0;color:var(--mut);font-size:14px;margin-bottom:8px;}
.sp{width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:rot .7s linear infinite;flex-shrink:0;}
@keyframes rot{to{transform:rotate(360deg);}}
.ait{font-size:11px;color:var(--or);background:rgba(230,126,34,0.12);border-radius:6px;padding:2px 7px;display:inline-block;margin-bottom:3px;}
.fld{margin-bottom:10px;}
.fld label{display:block;font-size:12px;color:var(--mut);margin-bottom:4px;}
.sep{height:1px;background:var(--brd);margin:12px 0;}
.tbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(192,57,43,0.15);color:var(--acc);border:1px solid rgba(192,57,43,0.25);}
.sh{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px;}
.sh h2{font-size:15px;font-weight:600;}
.pi{background:var(--sur);border-radius:var(--rs);border:1px solid var(--brd);padding:12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.pn{width:30px;height:30px;border-radius:7px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--acc);flex-shrink:0;margin-top:1px;}
.pi-i{flex:1;min-width:0;}
.pi-r{font-size:14px;font-weight:600;}
.pi-m{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.5;}
.pi-c{font-size:12px;color:#f39c12;margin-top:2px;font-style:italic;}
.del{background:none;border:none;color:var(--mut);cursor:pointer;padding:4px;font-size:15px;flex-shrink:0;}
.empty{text-align:center;color:var(--mut);padding:32px 0;font-size:14px;}
.bot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:8px 12px calc(8px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 80%,transparent);display:flex;gap:8px;}
.bot .btn{margin-bottom:0;flex:1;font-size:13px;padding:13px 8px;}
.fab{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));right:20px;width:64px;height:64px;background:var(--acc);border:none;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:28px;cursor:pointer;z-index:150;box-shadow:0 4px 20px rgba(192,57,43,0.5);}
.fab:active{transform:scale(.92);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--s2);color:var(--text);padding:10px 18px;border-radius:40px;font-size:13px;font-weight:600;border:1px solid var(--brd);z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;text-align:center;}
.toast.on{transform:translateX(-50%) translateY(0);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.on{opacity:1;pointer-events:all;}
.mo{background:var(--sur);width:100%;max-width:480px;margin:0 auto;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .28s cubic-bezier(.34,1.2,.64,1);}
.ov.on .mo{transform:translateY(0);}
.hdl{width:36px;height:4px;background:var(--brd);border-radius:4px;margin:0 auto 14px;}
.mo h3{font-size:16px;font-weight:700;margin-bottom:12px;}
.mo p{font-size:13px;color:var(--mut);margin-bottom:14px;line-height:1.5;}
.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--brd);}
.sr:last-child{border-bottom:none;}
.sl{font-size:14px;font-weight:500;}
.ss{font-size:12px;color:var(--mut);}
.sb{background:var(--s2);border:none;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;color:var(--acc);}
/* Bouton ajouter rapide toujours visible */
.add-quick{background:rgba(39,174,96,0.12);border:1px solid rgba(39,174,96,0.3);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.add-quick span{font-size:13px;color:var(--mut);}
.add-quick button{background:var(--grn);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.add-quick button:active{opacity:.8;}
</style>
</head>
